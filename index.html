    <meta name="description" content="STRYT — your street, your people. Discover what's nearby, offer what you do, and ask your street for what you need." />
    <link rel="canonical" href="https://stryt.in/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="STRYT" />
    <meta property="og:url" content="https://stryt.in/" />
    <meta property="og:title" content="STRYT — Your street. Your people." />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="STRYT — Your street. Your people." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://stryt.in/" />
    <meta name="twitter:title" content="STRYT — Your street. Your people." />

    <meta name="twitter:image" content="https://stryt.in/og-image.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://stryt.in/#website",
          "url": "https://stryt.in/",
          "name": "STRYT",
          "description": "Your street. Your people. Discover shops, providers, and services on your street."
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://stryt.in/#software",
          "name": "STRYT",
          "operatingSystem": "Android, iOS, Web",
          "applicationCategory": "BusinessApplication, SocialNetworking",
          "downloadUrl": "https://stryt.in/stryt.apk",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "INR"
          }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
